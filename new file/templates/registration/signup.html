{% extends "base.html" %}
{% block title %}Sign Up | MarketLane{% endblock %}
{% block content %}
<section class="auth-page">
    <form class="form-panel validate-form" method="post" novalidate>
        {% csrf_token %}
        <h1>Sign Up</h1>
        {% for field in form %}
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        {% endfor %}
        <button class="button primary full" type="submit">Create Account</button>
        <p>Already have an account? <a href="{% url 'login' %}">Login</a>.</p>
    </form>
</section>
{% endblock %}
