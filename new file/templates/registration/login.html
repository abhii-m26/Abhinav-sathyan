{% extends "base.html" %}
{% block title %}Login | MarketLane{% endblock %}
{% block content %}
<section class="auth-page">
    <form class="form-panel validate-form" method="post" novalidate>
        {% csrf_token %}
        <h1>Login</h1>
        {{ form.non_field_errors }}
        {% for field in form %}
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        {% endfor %}
        <button class="button primary full" type="submit">Login</button>
        <p>New here? <a href="{% url 'signup' %}">Create an account</a>.</p>
    </form>
</section>
{% endblock %}
